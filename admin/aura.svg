<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0f1720"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="32" height="32" rx="7" ry="7" fill="none" stroke="#5aaeff" stroke-width="0.5" opacity="0.25"/>

  <!-- Glow halo behind A -->
  <ellipse cx="16" cy="17" rx="7" ry="5" fill="#5aaeff" opacity="0.12" filter="url(#softglow)"/>

  <!-- Letter A — clean geometric, accent blue with glow -->
  <g filter="url(#glow)">
    <!-- Left leg -->
    <line x1="9" y1="24" x2="16" y2="8" stroke="#5aaeff" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="23" y1="24" x2="16" y2="8" stroke="#5aaeff" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Crossbar -->
    <line x1="11.4" y1="18.5" x2="20.6" y2="18.5" stroke="#5aaeff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Small dot/accent at apex — circuit-node feel -->
  <circle cx="16" cy="8" r="1.4" fill="#7ec8ff" opacity="0.9"/>
</svg>
